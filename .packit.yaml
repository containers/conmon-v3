---
# See the documentation for more information:
# https://packit.dev/docs/configuration/

downstream_package_name: conmon-v3
upstream_tag_template: v{version}

# fix-spec-file runs on Copr only; see .packit-copr-rpm.sh
srpm_build_deps:
  - cargo
  - git-archive-all
  - make

actions:
  fix-spec-file: "bash .packit-copr-rpm.sh"

packages:
  conmon-fedora:
    pkg_tool: fedpkg
    specfile_path: rpm/conmon-v3.spec
  conmon-centos:
    pkg_tool: centpkg
    specfile_path: rpm/conmon-v3.spec
  conmon-eln:
    specfile_path: rpm/conmon-v3.spec

jobs:
  - job: copr_build
    trigger: pull_request
    packages: [conmon-fedora]
    notifications: &copr_build_failure_notification
      failure_comment:
        message: "Ephemeral COPR build failed."
    enable_net: true
    targets:
      fedora-all-aarch64: {}
      fedora-all-x86_64: {}
      fedora-eln-aarch64:
        additional_repos:
          - "https://kojipkgs.fedoraproject.org/repos/eln-build/latest/aarch64/"
      fedora-eln-x86_64:
        additional_repos:
          - "https://kojipkgs.fedoraproject.org/repos/eln-build/latest/x86_64/"

  - job: copr_build
    trigger: pull_request
    packages: [conmon-centos]
    notifications: *copr_build_failure_notification
    enable_net: true
    targets: &centos_copr_targets
      - centos-stream-10-aarch64
      - centos-stream-10-x86_64

  # Run on commit to main branch
  - job: copr_build
    trigger: commit
    packages: [conmon-fedora]
    branch: main
    owner: rhcontainerbot
    project: podman-next
    enable_net: true

  # Validate test (no RPM build needed, runs only on latest stable Fedora)
  - job: tests
    trigger: pull_request
    identifier: validate
    skip_build: true
    targets:
      - fedora-latest-stable-x86_64
    tmt_plan: "/plans/validate"

  # Unit tests (no RPM build needed, runs only on latest stable Fedora)
  - job: tests
    trigger: pull_request
    identifier: unit
    skip_build: true
    targets:
      - fedora-latest-stable-x86_64
    tmt_plan: "/plans/unit"

  # E2E tests on Fedora
  - job: tests
    trigger: pull_request
    identifier: e2e-fedora
    packages: [conmon-fedora]
    targets:
      - fedora-all-aarch64
      - fedora-all-x86_64
    tmt_plan: "/plans/e2e"
    tf_extra_params: &tf_extra_params_fedora
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/fedora-$releasever/rhcontainerbot-podman-next-fedora-$releasever.repo

  # E2E tests on CentOS Stream
  - job: tests
    trigger: pull_request
    identifier: e2e-centos
    packages: [conmon-centos]
    targets: *centos_copr_targets
    tmt_plan: "/plans/e2e"
    tf_extra_params: &tf_extra_params_centos
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/centos-stream-$releasever/rhcontainerbot-podman-next-centos-stream-$releasever.repo

  # Podman system tests on Fedora
  - job: tests
    trigger: pull_request
    identifier: podman-fedora
    packages: [conmon-fedora]
    targets:
      - fedora-all-aarch64
      - fedora-all-x86_64
    tmt_plan: "/plans/podman"
    tf_extra_params: *tf_extra_params_fedora

  # Podman system tests on CentOS Stream
  - job: tests
    trigger: pull_request
    identifier: podman-centos
    packages: [conmon-centos]
    targets: *centos_copr_targets
    tmt_plan: "/plans/podman"
    tf_extra_params: *tf_extra_params_centos

  # Downstream sync for Fedora
  - job: propose_downstream
    trigger: release
    packages: [conmon-fedora]
    update_release: false
    dist_git_branches:
      - fedora-all

  # The conmon-v3 project is not yet ready for CentOS Stream.
  # # Downstream sync for CentOS Stream
  # - job: propose_downstream
  #   trigger: release
  #   packages: [conmon-centos]
  #   update_release: false
  #   dist_git_branches:
  #     - c10s

  - job: koji_build
    trigger: commit
    packages: [conmon-fedora]
    dist_git_branches:
      - fedora-all

  - job: bodhi_update
    trigger: commit
    packages: [conmon-fedora]
    dist_git_branches:
      - fedora-branched # rawhide updates are created automatically
